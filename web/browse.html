<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#101115">
<title>Prompt Library</title>
<style>
:root{color-scheme:dark;--bg:#101115;--panel:#17191f;--raised:#1d2027;--line:#2a2e38;--text:#f0f1f5;--muted:#9298a6;--accent:#88a8ff;--danger:#ee777d;--radius:16px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit;color:inherit}.shell{width:min(1480px,100%);margin:auto;padding:clamp(14px,3vw,34px)}
.top{position:sticky;top:0;z-index:5;padding:10px 0 18px;background:linear-gradient(var(--bg) 78%,transparent)}.headline{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px}.headline h1{font-size:clamp(22px,4vw,34px);letter-spacing:-.04em;margin:0}.headline p{margin:4px 0 0;color:var(--muted)}.count{color:var(--muted);white-space:nowrap}
.toolbar{display:grid;grid-template-columns:minmax(180px,1fr) auto auto;gap:10px}.control,.button{border:1px solid var(--line);background:var(--panel);border-radius:12px;min-height:44px;padding:0 14px;outline:none}.control:focus{border-color:var(--accent);box-shadow:0 0 0 3px #88a8ff1e}.button{cursor:pointer;transition:border-color .18s,background .18s,transform .18s}.button:hover{background:var(--raised);border-color:#3b4150}.button:active{transform:scale(.98)}.button.primary{background:var(--accent);border-color:var(--accent);color:#10131a;font-weight:700}.category-toggle{display:none;align-items:center;gap:9px}.menu-icon{display:grid;gap:3px}.menu-icon i{display:block;width:14px;height:1.5px;border-radius:2px;background:currentColor}
.library{display:grid;grid-template-columns:220px minmax(0,1fr);gap:24px;align-items:start}.categories{position:sticky;top:126px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:8px}.category-head{display:flex;align-items:center;justify-content:space-between;padding:7px 5px 9px 10px}.category-title{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}.category-close{display:none;width:36px;height:36px;min-height:0;padding:0;border-radius:10px}.category{width:100%;display:flex;align-items:center;gap:8px;border:0;background:transparent;border-radius:9px;padding:9px 10px;text-align:left;cursor:pointer;color:#c5c9d2;transition:background .15s,color .15s}.category:hover{background:var(--raised);color:var(--text)}.category.active{background:#88a8ff18;color:var(--accent)}.category .label{margin:0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.category .badge{margin-left:auto;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}.category.depth-1{padding-left:25px;font-size:13px}.category.depth-2{padding-left:40px;font-size:12px}.category-shade{position:fixed;inset:0;z-index:29;background:#050609a8;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .22s}.content{min-width:0}.crumbs{min-height:36px;display:flex;align-items:center;gap:6px;margin:0 0 12px;color:var(--muted)}.crumb{border:0;background:transparent;color:inherit;padding:4px 2px;cursor:pointer}.crumb:hover{color:var(--text)}.crumb.current{color:var(--text);font-weight:650}.folder-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}.folder{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:12px;cursor:pointer;text-align:left;transition:.16s}.folder:hover{background:var(--raised);border-color:#3b4150}.folder-icon{width:32px;height:32px;display:grid;place-items:center;border-radius:9px;background:#88a8ff14;color:var(--accent)}.folder-copy{min-width:0}.folder-name{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.folder-count{font-size:11px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{position:relative;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .18s,border-color .18s,box-shadow .18s}.card:hover{transform:translateY(-2px);border-color:#3c4250;box-shadow:0 14px 35px #0004}.preview{height:170px;background:#0b0c0f;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}.preview img{width:100%;height:100%;object-fit:contain;display:block}.placeholder{color:#555c69;font-size:12px}.body{padding:14px}.path{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.name{font-weight:700;font-size:16px;margin:3px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.excerpt{height:42px;color:#b9bec9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.actions{display:flex;gap:8px;margin-top:13px}.actions .button{min-height:36px;padding:0 12px;flex:1}.empty{text-align:center;color:var(--muted);padding:70px 10px}.more{display:block;margin:24px auto 4px;min-width:180px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#e9edf7;color:#12141a;padding:10px 16px;border-radius:999px;pointer-events:none;transition:.2s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
.backdrop{position:fixed;inset:0;background:#050609a8;backdrop-filter:blur(6px);z-index:10;opacity:0;pointer-events:none;transition:.2s}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:absolute;right:0;top:0;height:100%;width:min(560px,100%);background:var(--panel);border-left:1px solid var(--line);padding:22px;overflow:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.22,.75,.22,1)}.open .drawer{transform:none}.drawer-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.drawer h2{margin:0;font-size:20px}.label{display:block;color:var(--muted);font-size:12px;margin:14px 0 6px}.field{width:100%;background:#111318;border:1px solid var(--line);border-radius:11px;padding:11px 12px;outline:none}.field:focus{border-color:var(--accent)}textarea.field{min-height:230px;resize:vertical}.drawer-preview{height:230px;background:#0b0c0f;border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:14px}.drawer-preview img{width:100%;height:100%;object-fit:contain}.drawer-actions{display:flex;gap:9px;margin-top:18px}.danger{color:var(--danger)}
@media(max-width:820px){body.categories-open{overflow:hidden}.library{display:block}.category-toggle{display:flex}.toolbar{grid-template-columns:auto minmax(0,1fr) auto}.toolbar select{display:none}.categories{position:fixed;z-index:30;inset:0 auto 0 0;top:0;width:min(320px,86vw);border:0;border-right:1px solid var(--line);border-radius:0;padding:10px 10px 24px;overflow-y:auto;transform:translateX(-102%);transition:transform .25s cubic-bezier(.22,.75,.22,1);box-shadow:18px 0 55px #0006}.categories.open{transform:none}.category-shade.open{opacity:1;pointer-events:auto}.category-head{padding:8px 5px 14px 10px;border-bottom:1px solid var(--line);margin-bottom:7px}.category-title{font-size:12px;color:var(--text)}.category-close{display:block}.category{padding:11px 10px}.category.depth-1{padding-left:28px}.category.depth-2{padding-left:45px}.folder-row{display:flex;overflow:auto;scrollbar-width:none}.folder{min-width:180px}}@media(max-width:680px){.shell{padding:12px}.headline{align-items:flex-start}.headline p{display:none}.category-toggle{padding:0 12px}.category-toggle .toggle-label{display:none}.grid{grid-template-columns:1fr 1fr;gap:9px}.preview{height:130px}.body{padding:11px}.excerpt{display:none}.actions .button{font-size:12px;padding:0 8px}.drawer{padding:18px}.drawer-preview{height:190px}}@media(max-width:430px){.grid{grid-template-columns:1fr}.preview{height:190px}}
.pin{position:absolute;z-index:2;right:10px;top:10px;width:36px;height:36px;border:1px solid #ffffff24;border-radius:50%;background:#11141bcc;color:#c8ccd6;display:grid;place-items:center;cursor:pointer;font-size:17px;backdrop-filter:blur(8px);transition:.18s}.pin:hover{transform:scale(1.06)}.pin.active{color:#f08baa;background:#281a22dd;border-color:#f08baa44}
.backdrop{display:grid;place-items:center;padding:20px}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:relative;right:auto;top:auto;height:auto;width:min(940px,100%);max-height:calc(100vh - 40px);background:#17191f;border:1px solid #303541;border-radius:20px;padding:0;overflow:hidden;transform:translateY(18px) scale(.985);opacity:0;box-shadow:0 30px 90px #000b;transition:transform .24s cubic-bezier(.22,.75,.22,1),opacity .2s}.open .drawer{transform:none;opacity:1}.drawer-head{height:68px;margin:0;padding:0 20px 0 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}.drawer-head h2{font-size:19px;letter-spacing:-.02em}.icon-close{margin-left:auto;width:38px;height:38px;min-height:0;padding:0;font-size:20px}.editor-grid{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(280px,.7fr);gap:0;min-height:0;max-height:calc(100vh - 184px);overflow:auto}.editor-main{padding:22px 24px 24px;border-right:1px solid var(--line)}.editor-media{padding:22px;background:#14161b}.editor-media .drawer-preview{height:310px;margin:0}.editor-media .drawer-actions{margin-top:10px}.editor-footer{min-height:76px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px}.footer-group{display:flex;align-items:center;gap:9px}.editor-footer .button{min-width:112px}.editor-footer .primary{min-width:150px}.field-hint{font-size:11px;color:var(--muted);margin-top:6px}.editor-main textarea.field{min-height:320px}.editor-main .label:first-child{margin-top:0}
@media(max-width:700px){.backdrop{place-items:end center;padding:0}.drawer{width:100%;max-height:94vh;border-width:1px 0 0;border-radius:20px 20px 0 0;transform:translateY(35px);}.drawer-head{height:60px;padding:0 16px 0 18px}.editor-grid{display:flex;flex-direction:column;max-height:calc(94vh - 132px);overflow:auto}.editor-main{order:2;padding:18px;border:0}.editor-media{order:1;padding:14px 18px;border-bottom:1px solid var(--line)}.editor-media .drawer-preview{height:180px}.editor-main textarea.field{min-height:190px}.editor-footer{min-height:72px;padding:12px 14px;position:sticky;bottom:0;background:#17191f}.editor-footer .button{min-width:0}.footer-group:first-child .danger{display:none}.editor-footer .primary{min-width:125px}}
</style>
</head>
<body><main class="shell">
  <section class="top"><div class="headline"><div><h1>Prompt library</h1><p>Browse, copy and refine reusable prompt presets.</p></div><div id="count" class="count"></div></div>
  <div class="toolbar"><button id="category-toggle" class="button category-toggle" aria-label="Open categories"><span class="menu-icon" aria-hidden="true"><i></i><i></i><i></i></span><span class="toggle-label">Categories</span></button><input id="search" class="control" placeholder="Search names, paths or prompt text…" autocomplete="off"><select id="sort" class="control"><option value="name">Name A–Z</option><option value="category">Category</option></select><button id="new" class="button primary">New preset</button></div></section>
  <div class="library"><aside id="categories" class="categories" aria-label="Preset categories"></aside><section class="content"><nav id="crumbs" class="crumbs" aria-label="Breadcrumb"></nav><div id="folders" class="folder-row"></div><div id="grid" class="grid"></div><button id="more" class="button more" hidden>Load more</button></section></div>
</main>
<div id="category-shade" class="category-shade"></div>
<div id="backdrop" class="backdrop"><section class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
  <header class="drawer-head"><div><h2 id="drawer-title">Edit preset</h2></div><button id="close" class="button icon-close" aria-label="Close editor">×</button></header>
  <div class="editor-grid">
    <div class="editor-main">
      <label class="label" for="key">Preset name</label><input id="key" class="field" placeholder="Characters/Heroes/example"><div class="field-hint">Use / to place this preset inside categories.</div>
      <label class="label" for="text">Prompt text</label><textarea id="text" class="field" placeholder="Write or paste your reusable prompt…"></textarea>
    </div>
    <aside class="editor-media"><div id="drawer-preview" class="drawer-preview"><span class="placeholder">No preview image</span></div><input id="file" type="file" accept="image/*" hidden><div class="drawer-actions"><button id="image" class="button">Choose preview</button><button id="clear-image" class="button">Remove</button></div></aside>
  </div>
  <footer class="editor-footer"><div class="footer-group"><button id="pin" class="button">Pin preset</button><button id="delete" class="button danger">Delete</button></div><div class="footer-group"><button id="cancel-edit" class="button">Cancel</button><button id="save" class="button primary">Update preset</button></div></footer>
</section></div>
<div id="toast" class="toast"></div>
<script>
const $=s=>document.querySelector(s), PAGE=48;
let presets={}, rows=[], visible=PAGE, editing=null, editorDirty=false, activeCategory="";
const grid=$("#grid"), more=$("#more"), search=$("#search"), sort=$("#sort"), backdrop=$("#backdrop"), categories=$("#categories"), crumbs=$("#crumbs"), folders=$("#folders"), categoryShade=$("#category-shade");
const normalized=new Map();
function indexRows(){normalized.clear();rows=Object.keys(presets).map(key=>{const parts=key.split("/");const name=parts.pop();normalized.set(key,`${key} ${presets[key]?.text||""}`.toLocaleLowerCase());return{key,name,path:parts.join(" / "),parts}});if(activeCategory&&!rows.some(r=>r.key.startsWith(activeCategory+"/")))activeCategory="";applySort();renderCategories()}
function applySort(){const coll=new Intl.Collator(undefined,{sensitivity:"base",numeric:true});rows.sort((a,b)=>sort.value==="category"?coll.compare(a.path,b.path)||coll.compare(a.name,b.name):coll.compare(a.name,b.name))}
function filtered(){const q=search.value.trim().toLocaleLowerCase();return rows.filter(r=>(!activeCategory||activeCategory==="@pinned"&&presets[r.key]?.pinned||activeCategory==="@recent"&&presets[r.key]?.last_used_at||r.key.startsWith(activeCategory+"/"))&&(!q||normalized.get(r.key).includes(q)))}
function categoryEntries(){const map=new Map();for(const row of rows){for(let i=1;i<=row.parts.length;i++){const path=row.parts.slice(0,i).join("/");map.set(path,(map.get(path)||0)+1)}}return [...map].sort((a,b)=>a[0].localeCompare(b[0],undefined,{sensitivity:"base",numeric:true}))}
function openCategories(){categories.classList.add("open");categoryShade.classList.add("open");document.body.classList.add("categories-open");$("#category-toggle").setAttribute("aria-expanded","true")}
function closeCategories(){categories.classList.remove("open");categoryShade.classList.remove("open");document.body.classList.remove("categories-open");$("#category-toggle").setAttribute("aria-expanded","false")}
function chooseCategory(path){activeCategory=path;visible=PAGE;renderCategories();render();if(matchMedia("(max-width:820px)").matches)closeCategories()}
function renderCategories(){const head=el("div","category-head"),title=el("div","category-title","Categories"),close=el("button","button category-close","×");close.type="button";close.setAttribute("aria-label","Close categories");close.onclick=closeCategories;head.append(title,close);categories.replaceChildren(head);const add=(name,count,path,depth=0)=>{const button=el("button",`category depth-${depth}${activeCategory===path?" active":""}`),label=el("span","label",name),badge=el("span","badge",String(count));button.append(label,badge);button.onclick=()=>chooseCategory(path);categories.append(button)};add("All presets",rows.length,"");const pinned=rows.filter(r=>presets[r.key]?.pinned).length,recent=rows.filter(r=>presets[r.key]?.last_used_at).length;if(pinned)add("Pinned",pinned,"@pinned");if(recent)add("Recent",recent,"@recent");for(const [path,count] of categoryEntries())add(path.split("/").pop(),count,path,Math.min(2,path.split("/").length-1))}
function renderCrumbs(){crumbs.replaceChildren();const root=el("button",`crumb${activeCategory?"":" current"}`,"All presets");root.onclick=()=>chooseCategory("");crumbs.append(root);if(!activeCategory)return;if(activeCategory.startsWith("@")){crumbs.append(el("span","","/"),el("span","crumb current",activeCategory==="@pinned"?"Pinned":"Recent"));return}let path="";for(const part of activeCategory.split("/")){crumbs.append(el("span","","/"));path=path?`${path}/${part}`:part;const target=path,button=el("button",`crumb${target===activeCategory?" current":""}`,part);button.onclick=()=>chooseCategory(target);crumbs.append(button)}}
function renderFolders(){folders.replaceChildren();const depth=activeCategory?activeCategory.split("/").length:0,children=new Map();for(const [path,count] of categoryEntries()){const parts=path.split("/");if(parts.length!==depth+1)continue;if(activeCategory&&!path.startsWith(activeCategory+"/"))continue;children.set(path,count)}for(const [path,count] of children){const button=el("button","folder"),icon=el("span","folder-icon","›"),copy=el("span","folder-copy");copy.append(el("div","folder-name",path.split("/").pop()),el("div","folder-count",`${count} preset${count===1?"":"s"}`));button.append(icon,copy);button.onclick=()=>chooseCategory(path);folders.append(button)}}
function el(tag,cls,text){const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n}
function card(row){const p=presets[row.key]||{},c=el("article","card"),pin=el("button",`pin${p.pinned?" active":""}`,"♥"),prev=el("div","preview");pin.title=p.pinned?"Unpin preset":"Pin preset";pin.onclick=async e=>{e.stopPropagation();await post("/preset_loader/pin",{key:row.key,pinned:!p.pinned});await reload();notify(p.pinned?"Preset unpinned":"Preset pinned")};if(p.preview){const img=new Image;img.loading="lazy";img.alt=row.name;img.src=`/preset_loader/preview/${encodeURIComponent(p.preview)}?v=${p.preview_version||0}`;img.onerror=()=>prev.replaceChildren(el("span","placeholder","Preview unavailable"));prev.append(img)}else prev.append(el("span","placeholder","No preview"));prev.onclick=()=>openEditor(row.key);const body=el("div","body");body.append(el("div","path",row.path||"Uncategorised"),el("div","name",row.name),el("div","excerpt",p.text||""));const acts=el("div","actions"),copy=el("button","button","Copy"),edit=el("button","button","Edit");copy.onclick=async()=>{await copyText(p.text||"");post("/preset_loader/touch",{key:row.key}).catch(()=>{});notify("Prompt copied")};edit.onclick=()=>openEditor(row.key);acts.append(copy,edit);body.append(acts);c.append(pin,prev,body);return c}
function render(reset=false){if(reset)visible=PAGE;renderCrumbs();renderFolders();const list=filtered(), frag=document.createDocumentFragment();for(const row of list.slice(0,visible))frag.append(card(row));grid.replaceChildren(frag);if(!list.length)grid.append(el("div","empty","No matching presets in this category"));more.hidden=visible>=list.length;const scope=activeCategory?` in ${activeCategory.replaceAll("/"," / ")}`:"";$("#count").textContent=`${list.length.toLocaleString()} preset${list.length===1?"":"s"}${scope}`}
function scheduleRender(){clearTimeout(scheduleRender.t);scheduleRender.t=setTimeout(()=>render(true),70)}
async function copyText(text){try{await navigator.clipboard.writeText(text)}catch{const t=el("textarea");t.value=text;document.body.append(t);t.select();document.execCommand("copy");t.remove()}}
function notify(text){const t=$("#toast");t.textContent=text;t.classList.add("show");clearTimeout(notify.t);notify.t=setTimeout(()=>t.classList.remove("show"),1300)}
async function post(url,body,form=false){const r=await fetch(url,{method:"POST",headers:form?{}:{"Content-Type":"application/json"},body:form?body:JSON.stringify(body)});const data=await r.json();if(data.status!=="ok")throw Error(data.message||"Request failed");return data}
async function reload({preserve=true}={}){const r=await fetch("/preset_loader/list",{cache:"no-store"});presets=await r.json();indexRows();render(!preserve);if(editing&&presets[editing]&&!editorDirty)fillEditor(editing)}
function fillEditor(key){const p=presets[key]||{};editing=key;editorDirty=false;$("#key").value=key||"";$("#key").readOnly=false;$("#text").value=p.text||"";$("#drawer-title").textContent=key?"Edit preset":"New preset";$("#save").textContent=key?"Update preset":"Create preset";$("#delete").hidden=!key;$("#pin").hidden=!key;$("#pin").textContent=p.pinned?"Unpin preset":"Pin preset";$("#clear-image").hidden=!p.preview;const box=$("#drawer-preview");box.replaceChildren();if(p.preview){const img=new Image;img.src=`/preset_loader/preview/${encodeURIComponent(p.preview)}?v=${p.preview_version||0}`;box.append(img)}else box.append(el("span","placeholder","No preview image"))}
function openEditor(key=null){fillEditor(key);backdrop.classList.add("open");document.body.style.overflow="hidden";setTimeout(()=>$(key?"#text":"#key").focus(),220)}function closeEditor(){backdrop.classList.remove("open");document.body.style.overflow=""}function requestCloseEditor(){if(!backdrop.classList.contains("open"))return;if(editorDirty&&!confirm("Discard unsaved changes?"))return;closeEditor()}
$("#category-toggle").onclick=openCategories;categoryShade.onclick=closeCategories;$("#new").onclick=()=>openEditor();$("#close").onclick=$("#cancel-edit").onclick=requestCloseEditor;backdrop.onclick=e=>{if(e.target===backdrop)requestCloseEditor()};document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeCategories();requestCloseEditor()}});
$("#key").oninput=$("#text").oninput=()=>{editorDirty=true};
$("#save").onclick=async()=>{const key=$("#key").value.trim(),text=$("#text").value;if(!key)return notify("Enter a preset name");try{if(editing&&key!==editing)await post("/preset_loader/rename",{old_key:editing,new_key:key});else if(!editing&&presets[key])throw Error("A preset with that name already exists");await post("/preset_loader/save",{key,text});editing=key;editorDirty=false;await reload();fillEditor(key);notify("Preset saved")}catch(e){notify(e.message)}};
$("#pin").onclick=async()=>{if(!editing)return;try{await post("/preset_loader/pin",{key:editing,pinned:!presets[editing]?.pinned});await reload();fillEditor(editing);notify(presets[editing]?.pinned?"Preset pinned":"Preset unpinned")}catch(e){notify(e.message)}};
$("#delete").onclick=async()=>{if(!editing||!confirm(`Delete “${editing}”?`))return;try{await post("/preset_loader/delete",{key:editing});closeEditor();editing=null;await reload();notify("Preset deleted")}catch(e){notify(e.message)}};
$("#image").onclick=()=>$("#file").click();$("#file").onchange=async e=>{const file=e.target.files[0];if(!file||!editing)return;const f=new FormData;f.append("key",editing);f.append("file",file);try{await post("/preset_loader/set_preview",f,true);await reload();fillEditor(editing);notify("Preview updated")}catch(err){notify(err.message)}e.target.value=""};
$("#clear-image").onclick=async()=>{if(!editing)return;try{await post("/preset_loader/clear_preview",{key:editing});await reload();fillEditor(editing);notify("Preview cleared")}catch(e){notify(e.message)}};
search.oninput=scheduleRender;sort.onchange=()=>{applySort();render(true)};more.onclick=()=>{visible+=PAGE;render()};
const events=new EventSource("/preset_loader/events");events.addEventListener("presets-changed",()=>reload());
reload({preserve:false}).catch(e=>{grid.replaceChildren(el("div","empty",`Could not load presets: ${e.message}`))});
</script></body></html>
