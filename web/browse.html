<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#101115">
  <title>Prompt Library</title>
  <link rel="stylesheet" href="/preset_loader/assets/preset_ui.css">
  <link rel="stylesheet" href="/preset_loader/assets/browse.css">
</head>
<body class="pl-scope">
  <main class="shell">
    <section class="top">
      <div class="headline">
        <div>
          <h1>Prompt library</h1>
          <p>Browse, copy and refine reusable prompt presets.</p>
        </div>
        <div id="count" class="count"></div>
      </div>
      <div class="toolbar">
        <button id="category-toggle" class="button category-toggle" aria-label="Open categories" aria-expanded="false">
          <span class="menu-icon" aria-hidden="true"><i></i><i></i><i></i></span>
          <span class="toggle-label">Categories</span>
        </button>
        <input id="search" class="control" placeholder="Search names, paths or prompt text…" autocomplete="off">
        <select id="sort" class="control">
          <option value="name">Name A–Z</option>
          <option value="category">Category</option>
        </select>
        <button id="new" class="button primary">New preset</button>
      </div>
    </section>
    <div class="library">
      <aside id="categories" class="categories" aria-label="Preset categories"></aside>
      <section class="content">
        <nav id="crumbs" class="crumbs" aria-label="Breadcrumb"></nav>
        <div id="folders" class="folder-row"></div>
        <div id="grid" class="grid"></div>
        <button id="more" class="button more" hidden>Load more</button>
      </section>
    </div>
  </main>
  <div id="category-shade" class="category-shade"></div>
  <div id="toast" class="toast"></div>
  <script type="module" src="/preset_loader/assets/browse.js"></script>
</body>
</html>
