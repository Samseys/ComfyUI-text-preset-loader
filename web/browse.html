<style>

.library{display:grid;grid-template-columns:220px minmax(0,1fr);gap:24px;align-items:start}.categories{position:sticky;top:126px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:8px}.category-head{display:flex;align-items:center;justify-content:space-between;padding:7px 5px 9px 10px}.category-title{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}.category-close{display:none;width:36px;height:36px;min-height:0;padding:0;border-radius:10px}.category{width:100%;display:flex;align-items:center;gap:8px;border:0;background:transparent;border-radius:9px;padding:9px 10px;text-align:left;cursor:pointer;color:#c5c9d2;transition:background .15s,color .15s}.category:hover{background:var(--raised);color:var(--text)}.category.active{background:#88a8ff18;color:var(--accent)}.category .label{margin:0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.category .badge{margin-left:auto;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}.category.depth-1{padding-left:25px;font-size:13px}.category.depth-2{padding-left:40px;font-size:12px}.category-shade{position:fixed;inset:0;z-index:29;background:#050609a8;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .22s}.content{min-width:0}.crumbs{min-height:36px;display:flex;align-items:center;gap:6px;margin:0 0 12px;color:var(--muted)}.crumb{border:0;background:transparent;color:inherit;padding:4px 2px;cursor:pointer}.crumb:hover{color:var(--text)}.crumb.current{color:var(--text);font-weight:650}.folder-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}.folder{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:12px;cursor:pointer;text-align:left;transition:.16s}.folder:hover{background:var(--raised);border-color:#3b4150}.folder-icon{width:32px;height:32px;display:grid;place- .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{position:relative;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .18s,border-color .18s,box-shadow .18s}.card:hover{transform:translateY(-2px);border-color:#3c4250;box-shadow:0 14px 35px #0004}.preview{height:170px;background:#0b0c0f;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}.preview img{width:100%;height:100%;object-fit:contain;display:block}.placeholder{color:#555c69;font-size:12px}.body{padding:14px}.path{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.name{font-weight:700;font-size:16px;margin:3px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.excerpt{height:42px;color:#b9bec9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.actions{display:flex;gap:8px;margin-top:13px}.actions .button{min-height:36px;padding:0 12px;flex:1}.empty{text-align:center;color:var(--muted);padding:70px 10px}.more{display:block;margin:24px auto 4px;min-width:180px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#e9edf7;color:#12141a;padding:10px 16px;border-radius:999px;pointer-events:none;transition:.2s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
.backdrop{position:fixed;inset:0;background:#050609a8;backdrop-filter:blur(6px);z-index:10;opacity:0;pointer-events:none;transition:.2s}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:absolute;right:0;top:0;height:100%;width:min(560px,100%);background:var(--panel);border-left:1px solid var(--line);padding:22px;overflow:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.22,.75,.22,1)}.open .drawer{transform:none}.drawer-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.drawer h2{margin:0;font-size:20px}.label{display:block;color:var(--muted);font-size:12px;margin:14px 0 6px}.field{width:100%;background:#111318;border:1px solid var(--line);border-radius:11px;padding:11px 12px;outline:none}.field:focus{border-color:var(--accent)}textarea.field{min-height:230px;resize:vertical}.drawer-preview{height:230px;background:#0b0c0f;border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:14px}.drawer-preview img{width:100%;height:100%;object-fit:contain}.drawer-actions{display:flex;gap:9px;margin-top:18px}.danger{color:var(--danger)}
@media(max-width:820px){body.categories-open{overflow:hidden}.library{display:block}.category-toggle{display:flex}.toolbar{grid-template-columns:auto minmax(0,1fr) auto}.toolbar select{display:none}.categories{position:fixed;z-index:30;inset:0 auto 0 0;top:0;width:min(320px,86vw);border:0;border-right:1px solid var(--line);border-radius:0;padding:10px 10px 24px;overflow-y:auto;transform:translateX(-102%);transition:transform .25s cubic-bezier(.22,.75,.22,1);box-shadow:18px 0 55px #0006}.categories.open{transform:none}.category-shade.open{opacity:1;pointer-events:auto}.category-head{padding:8px 5px 14px 10px;border-bottom:1px solid var(--line);margin-bottom:7px}.category-title{font-size:12px;color:var(--text)}.category-close{display:block}.category{padding:11px 10px}.category.depth-1{padding-left:28px}.category.depth-2{padding-left:45px}.folder-row{display:flex;overflow:auto;scrollbar-width:none}.folder{min-width:180px}}@media(max-width:680px){.shell{padding:12px}.headline{align-items:flex-start}.headline p{display:none}.category-toggle{padding:0 12px}.category-toggle .toggle-label{display:none}.grid{grid-template-columns:1fr 1fr;gap:9px}.preview{height:130px}.body{padding:11px}.excerpt{display:none}.actions .button{font-size:12px;padding:0 8px}.drawer{padding:18px}.drawer-preview{height:190px}}@media(max-width:430px){.grid{grid-template-columns:1fr}.preview{height:190px}}
.pin{position:absolute;z-index:2;right:10px;top:10px;width:36px;height:36px;border:1px solid #ffffff24;border-radius:50%;background:#11141bcc;color:#c8ccd6;display:grid;place-items:center;cursor:pointer;font-size:17px;backdrop-filter:blur(8px);transition:.18s}.pin:hover{transform:scale(1.06)}.pin.active{color:#f08baa;background:#281a22dd;border-color:#f08baa44}
.backdrop{display:grid;place-items:center;padding:20px}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:relative;right:auto;top:auto;height:auto;width:min(940px,100%);max-height:calc(100vh - 40px);background:#17191f;border:1px solid #303541;border-radius:20px;padding:0;overflow:hidden;transform:translateY(18px) scale(.985);opacity:0;box-shadow:0 30px 90px #000b;transition:transform .24s cubic-bezier(.22,.75,.22,1),opacity .2s}.open .drawer{transform:none;opacity:1}.drawer-head{height:68px;margin:0;padding:0 20px 0 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}.drawer-head h2{font-size:19px;letter-spacing:-.02em}.icon-close{margin-left:auto;width:38px;height:38px;min-height:0;padding:0;font-size:20px}.editor-grid{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(280px,.7fr);gap:0;min-height:0;max-height:calc(100vh - 184px);overflow:auto}.editor-main{padding:22px 24px 24px;border-right:1px solid var(--line)}.editor-media{padding:22px;background:#14161b}.editor-media .drawer-preview{height:310px;margin:0}.editor-media .drawer-actions{margin-top:10px}.editor-footer{min-height:76px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px}.footer-group{display:flex;align-items:center;gap:9px}.editor-footer .button{min-width:112px}.editor-footer .primary{min-width:150px}.field-hint{font-size:11px;color:var(--muted);margin-top:6px}.editor-main textarea.field{min-height:320px}.editor-main .label:first-child{margin-top:0}
@media(max-width:700px){.backdrop{place-items:end center;padding:0}.drawer{width:100%;max-height:94vh;border-width:1px 0 0;border-radius:20px 20px 0 0;transform:translateY(35px);}.drawer-head{height:60px;padding:0 16px 0 18px}.editor-grid{display:flex;flex-direction:column;max-height:calc(94vh - 132px);overflow:auto}.editor-main{order:2;padding:18px;border:0}.editor-media{order:1;padding:14px 18px;border-bottom:1px solid var(--line)}.editor-media .drawer-preview{height:180px}.editor-main textarea.field{min-height:190px}.editor-footer{min-height:72px;padding:12px 14px;position:sticky;bottom:0;background:#17191f}.editor-footer .button{min-width:0}.footer-group:first-child .danger{display:none}.editor-footer .primary{min-width:125px}}
@media(max-width:520px){.headline{display:grid;grid-template-columns:1fr;gap:2px;margin-bottom:12px}.count{font-size:12px}.toolbar{grid-template-columns:auto minmax(0,1fr)}.toolbar #new{grid-column:1/-1}.top{padding-bottom:14px}}
.composer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px}.composer-head .label{margin:0}.part-picker{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:7px}.part-list{display:grid;gap:7px;margin-top:10px}.part-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:#13151a}.part-row.disabled{opacity:.5}.part-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.part-actions{display:flex;gap:4px}.part-actions button{width:30px;height:30px;min-height:0;padding:0;border-radius:8px}.resolved{min-height:110px;max-height:220px;overflow:auto;margin-top:8px;padding:12px;white-space:pre-wrap;color:#bdc3ce;background:#101217;border:1px solid var(--line);border-radius:11px;font:12px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace}.composition-badge{display:inline-flex;margin-top:8px;padding:3px 7px;border-radius:999px;background:#88a8ff18;color:var(--accent);font-size:11px;font-weight:650}
</style>
</head>
<body><main class="shell">
  <section class="top"><div class="headline"><div><h1>Prompt library</h1><p>Browse, copy and refine reusable prompt presets.</p></div><div id="count" class="count"></div></div>
  <div class="toolbar"><button id="category-toggle" class="button category-toggle" aria-label="Open categories"><span class="menu-icon" aria-hidden="true"><i></i><i></i><i></i></span><span class="toggle-label">Categories</span></button><input id="search" class="control" placeholder="Search names, paths or prompt text…" autocomplete="off"><select id="sort" class="control"><option value="name">Name A–Z</option><option value="category">Category</option></select><button id="new" class="button primary">New preset</button></div></section>
  <div class="library"><aside id="categories" class="categories" aria-label="Preset categories"></aside><section class="content"><nav id="crumbs" class="crumbs" aria-label="Breadcrumb"></nav><div id="folders" class="folder-row"></div><div id="grid" class="grid"></div><button id="more" class="button more" hidden>Load more</button></section></div>
</main>
<div id="category-shade" class="category-shade"></div>
<div id="toast" class="toast"></div>
<script type="module">
import { normalizeParts, resolvePreset, presetKind, isComposition, openPresetEditor, openPartCreator, openPresetPicker, iconSvg, pathTone } from "/extensions/ComfyUI-text-preset-loader/preset_composer.js";
const $=s=>document.querySelector(s), PAGE=48;
let presets={}, rows=[], visible=PAGE, activeCategory="@prompts";
const grid=$("#grid"), more=$("#more"), search=$("#search"), sort=$("#sort"), categories=$("#categories"), crumbs=$("#crumbs"), folders=$("#folders"), categoryShade=$("#category-shade");
$("#category-toggle .menu-icon").innerHTML=iconSvg("menu",17);
const normalized=new Map();
function indexRows(){normalized.clear();rows=Object.keys(presets).map(key=>{const parts=key.split("/");const name=parts.pop(),refs=normalizeParts(presets[key]).map(p=>p.key||p.text||"").join(" ");normalized.set(key,`${key} ${refs}`.toLocaleLowerCase());return{key,name,path:parts.join(" / "),parts}});if(activeCategory&&!activeCategory.startsWith("@")&&!rows.some(r=>r.key.startsWith(activeCategory+"/")))activeCategory="@prompts";applySort();renderCategories()}
function applySort(){const coll=new Intl.Collator(undefined,{sensitivity:"base",numeric:true});rows.sort((a,b)=>sort.value==="category"?coll.compare(a.path,b.path)||coll.compare(a.name,b.name):coll.compare(a.name,b.name))}
function filtered(){const q=search.value.trim().toLocaleLowerCase();return rows.filter(r=>(activeCategory==="@prompts"&&presetKind(r.key,presets[r.key])!=="part"||activeCategory==="@parts"&&presetKind(r.key,presets[r.key])==="part"||activeCategory==="@pinned"&&presets[r.key]?.pinned||activeCategory==="@recent"&&presets[r.key]?.last_used_at||!activeCategory.startsWith("@")&&presetKind(r.key,presets[r.key])!=="part"&&r.key.startsWith(activeCategory+"/"))&&(!q||normalized.get(r.key).includes(q)))}
function categoryEntries(){const map=new Map();for(const row of rows.filter(r=>presetKind(r.key,presets[r.key])!=="part")){for(let i=1;i<=row.parts.length;i++){const path=row.parts.slice(0,i).join("/");map.set(path,(map.get(path)||0)+1)}}return [...map].sort((a,b)=>a[0].localeCompare(b[0],undefined,{sensitivity:"base",numeric:true}))}
function openCategories(){categories.classList.add("open");categoryShade.classList.add("open");document.body.classList.add("categories-open");$("#category-toggle").setAttribute("aria-expanded","true")}
function closeCategories(){categories.classList.remove("open");categoryShade.classList.remove("open");document.body.classList.remove("categories-open");$("#category-toggle").setAttribute("aria-expanded","false")}
function chooseCategory(path){activeCategory=path;visible=PAGE;renderCategories();render();if(matchMedia("(max-width:820px)").matches)closeCategories()}
function renderCategories(){const head=el("div","category-head"),title=el("div","category-title","Library"),close=el("button","button category-close");close.innerHTML=iconSvg("x",17);close.type="button";close.setAttribute("aria-label","Close categories");close.onclick=closeCategories;head.append(title,close);categories.replaceChildren(head);const add=(name,count,path,depth=0)=>{const button=el("button",`category depth-${depth}${activeCategory===path?" active":""}`),label=el("span","label",name),badge=el("span","badge",String(count));button.append(label,badge);button.onclick=()=>chooseCategory(path);categories.append(button)};add("Prompts",rows.filter(r=>presetKind(r.key,presets[r.key])!=="part").length,"@prompts");add("Parts",rows.filter(r=>presetKind(r.key,presets[r.key])==="part").length,"@parts");const pinned=rows.filter(r=>presets[r.key]?.pinned).length,recent=rows.filter(r=>presets[r.key]?.last_used_at).length;if(pinned)add("Pinned",pinned,"@pinned");if(recent)add("Recent",recent,"@recent");categories.append(el("div","category-title","Prompt categories"));for(const [path,count] of categoryEntries())add(path.split("/").pop(),count,path,Math.min(2,path.split("/").length-1))}
function renderCrumbs(){crumbs.replaceChildren();const labels={"@prompts":"Prompts","@parts":"Parts","@pinned":"Pinned","@recent":"Recent"};if(activeCategory.startsWith("@")){crumbs.append(el("span","crumb current",labels[activeCategory]||"Library"));return}const root=el("button","crumb","Prompts");root.onclick=()=>chooseCategory("@prompts");crumbs.append(root);let path="";for(const part of activeCategory.split("/")){crumbs.append(el("span","","/"));path=path?`${path}/${part}`:part;const target=path,button=el("button",`crumb${target===activeCategory?" current":""}`,part);button.onclick=()=>chooseCategory(target);crumbs.append(button)}}
function renderFolders(){folders.replaceChildren();if(activeCategory.startsWith("@"))return;const depth=activeCategory?activeCategory.split("/").length:0,children=new Map();for(const [path,count] of categoryEntries()){const parts=path.split("/");if(parts.length!==depth+1)continue;if(activeCategory&&!path.startsWith(activeCategory+"/"))continue;children.set(path,count)}for(const [path,count] of children){const button=el("button","folder"),icon=el("span","folder-icon"),copy=el("span","folder-copy");icon.innerHTML=iconSvg("chevronRight",16);copy.append(el("div","folder-name",path.split("/").pop()),el("div","folder-count",`${count} preset${count===1?"":"s"}`));button.append(icon,copy);button.onclick=()=>chooseCategory(path);folders.append(button)}}
function el(tag,cls,text){const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n}
function breadcrumb(path,className="path"){const node=el("div",className),parts=String(path||"").split("/").filter(Boolean);if(!parts.length){node.textContent="Uncategorised";return node}parts.forEach((part,index)=>{const crumb=el("span","",part);crumb.style.color=pathTone(part);node.append(crumb);if(index<parts.length-1){const slash=el("span","","/");slash.style.cssText="color:#555d6b;margin:0 4px";node.append(slash)}});return node}
function excerptText(key){try{return resolvePreset(key,presets)}catch(e){return e.message||""}}
function card(row){const p=presets[row.key]||{},composed=isComposition(p),c=el("article","card"),pin=el("button",`pin${p.pinned?" active":""}`),prev=el("div","preview");pin.innerHTML=iconSvg("heart",17);pin.title=p.pinned?"Unpin preset":"Pin preset";pin.onclick=async e=>{e.stopPropagation();await post("/preset_loader/pin",{key:row.key,pinned:!p.pinned});await reload();notify(p.pinned?"Preset unpinned":"Preset pinned")};if(p.preview){const img=new Image;img.loading="lazy";img.alt=row.name;img.src=`/preset_loader/preview/${encodeURIComponent(p.preview)}?v=${p.preview_version||0}`;img.onerror=()=>prev.replaceChildren(el("span","placeholder","Preview unavailable"));prev.append(img)}else prev.append(el("span","placeholder","No preview"));prev.onclick=()=>openEditor(row.key);const body=el("div","body");body.append(el("div","path",row.path||"Uncategorised"),el("div","name",row.name),el("div","excerpt",excerptText(row.key)));if(composed)body.append(el("span","composition-badge","Composition"));const acts=el("div","actions"),copy=el("button","button","Copy"),edit=el("button","button","Edit");copy.onclick=async()=>{try{await copyText(resolvePreset(row.key,presets));post("/preset_loader/touch",{key:row.key}).catch(()=>{});notify("Prompt copied")}catch(e){notify(e.message)}};edit.onclick=()=>openEditor(row.key);acts.append(copy,edit);body.append(acts);c.append(pin,prev,body);return c}
const baseCard=card;card=function(row){const node=baseCard(row),plain=node.querySelector(".path");plain?.replaceWith(breadcrumb(row.path));return node};
function render(reset=false){if(reset)visible=PAGE;renderCrumbs();renderFolders();const list=filtered(), frag=document.createDocumentFragment();for(const row of list.slice(0,visible))frag.append(card(row));grid.replaceChildren(frag);if(!list.length)grid.append(el("div","empty","No matching presets in this category"));more.hidden=visible>=list.length;const scope=activeCategory?` in ${activeCategory.replaceAll("/"," / ")}`:"";$("#count").textContent=`${list.length.toLocaleString()} preset${list.length===1?"":"s"}${scope}`}
function scheduleRender(){clearTimeout(scheduleRender.t);scheduleRender.t=setTimeout(()=>render(true),70)}
async function copyText(text){try{await navigator.clipboard.writeText(text)}catch{const t=el("textarea");t.value=text;document.body.append(t);t.select();document.execCommand("copy");t.remove()}}
function notify(text){const t=$("#toast");t.textContent=text;t.classList.add("show");clearTimeout(notify.t);notify.t=setTimeout(()=>t.classList.remove("show"),1300)}
async function post(url,body,form=false){const r=await fetch(url,{method:"POST",headers:form?{}:{"Content-Type":"application/json"},body:form?body:JSON.stringify(body)});const data=await r.json();if(data.status!=="ok")throw Error(data.message||"Request failed");return data}
async function reload({preserve=true}={}){const r=await fetch("/preset_loader/list",{cache:"no-store"});presets=await r.json();indexRows();render(!preserve)}
const browserApi={
  save:(key,parts)=>post("/preset_loader/save",{key,parts}),
  rename:(oldKey,newKey)=>post("/preset_loader/rename",{old_key:oldKey,new_key:newKey}),
  remove:(key)=>post("/preset_loader/delete",{key}),
  pin:(key,pinned)=>post("/preset_loader/pin",{key,pinned}),
  setPreview:(key,file)=>{const f=new FormData;f.append("key",key);f.append("file",file);return post("/preset_loader/set_preview",f,true)},
  clearPreview:(key)=>post("/preset_loader/clear_preview",{key}),
  list:async()=>{const r=await fetch("/preset_loader/list",{cache:"no-store"});return r.json()},
  notify,
};
function partPicker(a,onPick){openPresetPicker({anchor:a,presets,mode:"parts",onSelect:onPick,createAction:{label:"+ New",run:()=>openPartCreator({presets,api:browserApi,onCreated:async k=>{await reload();onPick(k,presets[k])}})}})}
function openEditor(key=null){openPresetEditor({presets,editingKey:key,api:browserApi,pickPreset:partPicker,onChanged:()=>reload()});}
$("#category-toggle").onclick=openCategories;categoryShade.onclick=closeCategories;$("#new").onclick=()=>openEditor();document.addEventListener("keydown",e=>{if(e.key==="Escape")closeCategories()});
search.oninput=scheduleRender;sort.onchange=()=>{applySort();render(true)};more.onclick=()=>{visible+=PAGE;render()};
const events=new EventSource("/preset_loader/events");events.addEventListener("presets-changed",()=>reload());
// Mobile browsers suspend background tabs and drop the SSE stream (also when ComfyUI restarts),
// so any edits made elsewhere in the meantime are missed. Re-sync whenever the stream (re)connects
// and whenever the page regains focus or the network returns, so stale prompts can't linger.
events.addEventListener("ready",()=>reload());
const resync=()=>{if(document.visibilityState==="visible")reload().catch(()=>{})};
document.addEventListener("visibilitychange",resync);addEventListener("focus",resync);addEventListener("online",resync);
reload({preserve:false}).then(()=>{if(new URLSearchParams(location.search).get("compose")==="1")openEditor()}).catch(e=>{grid.replaceChildren(el("div","empty",`Could not load presets: ${e.message}`))});
</script></body></html>
